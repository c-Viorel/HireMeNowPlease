name: Deploy to NAS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: hireme-nas-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on:
      - self-hosted
      - hireme-nas

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync app files
        run: |
          set -euo pipefail
          mkdir -p /volume2/docker/hireme/app
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.env' \
            --exclude='node_modules/' \
            --exclude='vendor/' \
            ./ /volume2/docker/hireme/app/

      - name: Write production environment
        run: |
          set -euo pipefail
          cat > /volume2/docker/hireme/app/.env <<'ENV'
          APP_NAME=HireMe
          APP_ENV=production
          APP_KEY=${{ secrets.HIREME_APP_KEY }}
          APP_DEBUG=false
          APP_URL=https://hireme.vmedia.fun

          LOG_CHANNEL=stack
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=db
          DB_PORT=3306
          DB_DATABASE=hireme
          DB_USERNAME=hireme
          DB_PASSWORD=${{ secrets.HIREME_DB_PASSWORD }}
          DB_ROOT_PASSWORD=${{ secrets.HIREME_DB_ROOT_PASSWORD }}

          SESSION_DRIVER=database
          CACHE_STORE=database
          QUEUE_CONNECTION=database
          DB_QUEUE_TABLE=queue_jobs

          BROADCAST_CONNECTION=log
          FILESYSTEM_DISK=local

          MAIL_MAILER=${{ secrets.HIREME_MAIL_MAILER }}
          MAIL_SCHEME=null
          MAIL_HOST=${{ secrets.HIREME_MAIL_HOST }}
          MAIL_PORT=${{ secrets.HIREME_MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.HIREME_MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.HIREME_MAIL_PASSWORD }}
          MAIL_ENCRYPTION=${{ secrets.HIREME_MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS=${{ secrets.HIREME_MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME=HireMe

          HIREME_ADMIN_PASSWORD=${{ secrets.HIREME_ADMIN_PASSWORD }}
          HIREME_HTTP_BIND=0.0.0.0
          HIREME_HTTP_PORT=8082
          ENV
          chmod 600 /volume2/docker/hireme/app/.env

      - name: Deploy containers
        run: bash /volume2/docker/hireme/app/deploy/nas/deploy.sh
