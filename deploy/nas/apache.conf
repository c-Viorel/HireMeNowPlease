<VirtualHost *:80>
    ServerName hireme.vmedia.fun
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    <FilesMatch "^\.">
        Require all denied
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/hireme-error.log
    CustomLog ${APACHE_LOG_DIR}/hireme-access.log combined
</VirtualHost>
